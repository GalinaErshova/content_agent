# .streamlit/config.toml — настройки темы дэша.
# Streamlit читает этот файл автоматически при запуске из корня проекта.
# Палитра в духе historygame.ru: тёмный фон + тёплое «античное золото» как акцент.

[theme]
base = "dark"
primaryColor = "#c9a227"              # античное золото — кнопки, акценты, слайдеры
backgroundColor = "#0d0d12"           # почти чёрный основной фон
secondaryBackgroundColor = "#17171f"  # фон карточек/сайдбара
textColor = "#e7e3d8"                 # тёплый «пергаментный» белый
font = "serif"                        # засечки — для исторического характера

[server]
headless = true                       # не открывать браузер автоматически (по желанию)
